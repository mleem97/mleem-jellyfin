name: Build and Release Jellyfin Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      PLUGIN_GUID: eb5d7894-8eef-4b36-aa6f-5d124e828ce1
      PLUGIN_NAME: HDD Display
      PLUGIN_PACKAGE_PREFIX: HDDDisplay

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.Template/Jellyfin.Plugin.Template.csproj

      - name: Build
        run: dotnet build Jellyfin.Plugin.Template/Jellyfin.Plugin.Template.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish Jellyfin.Plugin.Template/Jellyfin.Plugin.Template.csproj -c Release -o ./publish --no-build

      - name: Prepare zip name
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if [ -z "$TAG_NAME" ] || [ "$TAG_NAME" = "" ]; then
            TAG_NAME="manual-${GITHUB_RUN_NUMBER}"
          fi
          VERSION="${TAG_NAME#v}"
          ZIP_NAME="${PLUGIN_PACKAGE_PREFIX}_${VERSION}.zip"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${ZIP_NAME}"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_URL=$RELEASE_URL" >> "$GITHUB_ENV"

      - name: Generate detailed changelog
        shell: bash
        run: |
          PREV_TAG="$(git tag --sort=-creatordate | grep -Fxv "${TAG_NAME}" | head -n1 || true)"
          if [ -n "${PREV_TAG}" ]; then
            RANGE="${PREV_TAG}..${TAG_NAME}"
          else
            RANGE="${TAG_NAME}"
          fi

          CHANGES="$(git log ${RANGE} --pretty=format:'- %s (%h)' -- . ':(exclude).github/upgrades/*' || true)"
          if [ -z "${CHANGES}" ]; then
            CHANGES='- Maintenance updates.'
          fi

          {
            echo 'CHANGELOG_TEXT<<EOF'
            echo "${CHANGES}"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Create zip package
        run: |
          cd publish
          zip -r "../${ZIP_NAME}" .

      - name: Generate release manifest with checksum
        shell: bash
        run: |
          CHECKSUM="$(md5sum "${ZIP_NAME}" | awk '{print toupper($1)}')"
          mkdir -p release-assets
          cp "${ZIP_NAME}" release-assets/
          cat > release-assets/changelog.md <<EOF
          # ${PLUGIN_NAME} ${TAG_NAME}

          ${CHANGELOG_TEXT}
          EOF

          CHECKSUM="$CHECKSUM" python - <<'PY'
          import json
          from datetime import datetime, timezone
          import os

          with open('manifest.json', 'r', encoding='utf-8') as f:
              manifest = json.load(f)

          plugin_guid = os.environ['PLUGIN_GUID']
          plugin_name = os.environ['PLUGIN_NAME']

          plugin = next((p for p in manifest if p.get('guid') == plugin_guid), None)
          if plugin is None:
              plugin = {
                  'guid': plugin_guid,
                  'name': plugin_name,
                  'description': plugin_name,
                  'overview': plugin_name,
                  'owner': os.environ.get('GITHUB_REPOSITORY_OWNER', ''),
                  'category': 'General',
                  'versions': []
              }
              manifest.append(plugin)

          existing_versions = plugin.get('versions') or []
          target_abi = (existing_versions[0].get('targetAbi') if existing_versions else None) or '10.10.0.0'
          now = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z')

          new_version = {
              'version': os.environ['VERSION'],
              'changelog': os.environ.get('CHANGELOG_TEXT', f"Release {os.environ['TAG_NAME']}"),
              'targetAbi': target_abi,
              'sourceUrl': os.environ['RELEASE_URL'],
              'checksum': os.environ['CHECKSUM'],
              'timestamp': now
          }

          filtered_versions = [v for v in existing_versions if v.get('version') != os.environ['VERSION']]
          plugin['versions'] = [new_version] + filtered_versions

          with open('release-assets/manifest.json', 'w', encoding='utf-8') as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)
              f.write('\n')
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-package
          path: release-assets/

      - name: Create GitHub release and upload package
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ env.CHANGELOG_TEXT }}
          files: |
            release-assets/${{ env.ZIP_NAME }}
            release-assets/manifest.json
            release-assets/changelog.md
          generate_release_notes: false

      - name: Update repository manifest.json on master
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          git fetch origin master
          git checkout master
          cp release-assets/manifest.json manifest.json

          if git diff --quiet -- manifest.json; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Update manifest for ${TAG_NAME} release"
          git push origin master
